<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Model Viewer -->

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <title>3D Viewer</title>

  <style>
    body {
      margin: 0;
      background: #000;
      overflow: hidden;
    }

   <model-viewer
src="model.glb"
camera-controls
auto-rotate
exposure="1.8"
shadow-intensity="1"
environment-image="studio"
camera-orbit="0deg 90deg 2m"
field-of-view="45deg"

>

</model-viewer>

    }
  </style>

</head>

<body>

<model-viewer
src="model.glb"
camera-controls
auto-rotate
exposure="1.8"
shadow-intensity="1"
environment-image="studio"
camera-target="auto auto auto"
bounds="tight"

>

</model-viewer>

</body>
</html>
