<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- MODEL VIEWER -->

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <title>3D Viewer</title>

  <style>
    body {
      margin: 0;
      background: #000;
      overflow: hidden;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background: #000;
    }
  </style>

</head>

<body>

<model-viewer
src="model.glb"
auto-rotate
auto-rotate-delay="0"
rotation-per-second="20deg"
camera-controls
exposure="1.8"
shadow-intensity="1"
environment-image="studio"
ar

>

</model-viewer>

</body>
</html>
